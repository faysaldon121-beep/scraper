name: Scrape Adult Videos

on:
  schedule:
    - cron: '0 3 * * *'          # daily at 03:00 UTC
  workflow_dispatch:

jobs:
  scrape:
    # 1) Pin the image — do NOT leave this as ubuntu-latest
    runs-on: ubuntu-22.04        # Jammy has the needed packages

    steps:
      - name: Show OS version (debug)
        run: lsb_release -a

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS is fine)
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install JS deps
        run: npm ci               # reproducible install

      - name: Install Puppeteer/Chrome deps (Jammy list)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates fonts-liberation \
            libasound2 \
            libatk-bridge2.0-0 libatk1.0-0 \
            libcups2 libdbus-1-3 libexpat1 \
            libfontconfig1 libgbm1 libgtk-3-0 \
            libnss3 libnspr4 libx11-6 libx11-xcb1 \
            libxcomposite1 libxcursor1 libxdamage1 \
            libxext6 libxfixes3 libxi6 libxrandr2 \
            libxss1 libxtst6 gconf-service libappindicator1

      - name: Run scraper
        run: npm run scrape
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

name: Scrape Adult Videos

on:
  schedule:
    - cron: '0 3 * * *'   # daily at 3:00 UTC
  workflow_dispatch:      # manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # Use 'npm install' if you don't have a package-lock.json, or commit it and use 'npm ci'
        run: npm install

      - name: Install Puppeteer dependencies (minimal)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libgbm1 \
            libasound2

      - name: Run scraper
        run: npm run scrape
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

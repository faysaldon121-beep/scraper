name: Scrape Adult Videos

on:
  schedule:
    - cron: '0 3 * * *'   # daily at 3:00 UTC
  workflow_dispatch:      # manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Puppeteer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libgbm1 \
            libxss1 \
            libasound2t64 \
            libxrandr2 \
            libxcomposite1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxtst6

      - name: Run scraper
        run: npm run scrape
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

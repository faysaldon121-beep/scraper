name: Scrape Adult Videos

on:
  schedule:
    - cron: '0 3 * * *'   # daily at 3:00 UTC
  workflow_dispatch:      # manual trigger

jobs:
  scrape:
    runs-on: ubuntu-22.04  # Pin to Ubuntu 22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'  # LTS version
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Puppeteer dependencies (Ubuntu 22.04 tested)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-xcb1 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxi6 \
            libxtst6 \
            libnss3 \
            libcups2 \
            libxss1 \
            libxrandr2 \
            libasound2 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libpangocairo-1.0-0 \
            libgtk-3-0 \
            libgbm1 \
            libdrm2 \
            libxkbcommon0 \
            libgcc1 \
            libglib2.0-0 \
            libnspr4 \
            libpango-1.0-0 \
            libstdc++6 \
            libx11-6 \
            libxcb1 \
            libxext6 \
            libxfixes3 \
            libxrender1 \
            ca-certificates \
            fonts-liberation \
            wget \
            xdg-utils

      - name: Run scraper
        run: npm run scrape
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
